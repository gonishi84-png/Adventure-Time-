<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>First Trip in California</title>
    <style>
        :root {
            --primary-color: #ff7eb3;
            --secondary-color: #8e44ad;
            --text-box-bg: rgba(0, 0, 0, 0.85);
            --choice-bg: rgba(255, 255, 255, 0.95);
            --choice-hover: #ff7eb3;
        }

        /* --- BULLETPROOF MOBILE LAYOUT --- */
        html {
            height: 100%;
            overflow: hidden; 
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100vh;
            height: 100dvh; /* iOS dynamic height */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            overflow: hidden; 
            position: relative; 
            touch-action: none; /* Stops pull-to-refresh and zooming */
            user-select: none; /* Stops accidental text highlighting */
            -webkit-user-select: none;
        }

        #game-container {
            position: absolute;
            inset: 0; /* Shorthand for top/left/right/bottom 0 */
            width: 100%;
            height: 100%;
            max-width: 1280px;
            margin: auto; 
            background-color: #000;
            overflow: hidden;
        }

        /* --- LAYERS --- */
        #background-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
            background-color: #333;
            z-index: 1;
        }

        #character-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Align to bottom */
            padding-bottom: 25vh; /* Keep above the dialogue box */
            z-index: 2;
        }

        .character-sprite {
            font-size: 10rem;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            animation: float 3s ease-in-out infinite;
        }
        
        @media (max-width: 768px) {
            .character-sprite { font-size: 7rem; padding-bottom: 30vh; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* --- UI ELEMENTS --- */
        #ui-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 10;
        }

        #dialogue-box {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 5%;
            width: 90%;
            height: 25%; 
            min-height: 150px;
            background-color: var(--text-box-bg);
            border: 2px solid #fff;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: #fff;
            display: none; 
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.7);
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        #name-label {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px #000;
        }

        #dialogue-text {
            font-size: 1.2rem;
            line-height: 1.5;
        }
        
        @media (max-width: 600px) {
            #name-label { font-size: 1.2rem; }
            #dialogue-text { font-size: 1rem; }
            #dialogue-box { padding: 15px; height: 30%; }
        }

        .continue-icon {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 1.5rem;
            animation: bounce 1s infinite;
        }

        /* --- CHOICES --- */
        #choices-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 70%;
            pointer-events: auto;
            z-index: 50; 
        }

        @media (max-width: 768px) {
            #choices-container { width: 90%; }
        }

        .choice-btn {
            background-color: var(--choice-bg);
            padding: 18px;
            border: 3px solid var(--secondary-color);
            border-radius: 12px;
            font-size: 1.2rem;
            color: #333;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .choice-btn:active {
            background-color: var(--choice-hover);
            color: white;
            transform: scale(0.97);
        }

        /* --- SCREENS --- */
        .full-screen {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            pointer-events: auto;
        }

        #title-screen { background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); }
        #game-over-screen { background: rgba(0,0,0,0.95); display: none; }
        #grade-screen { background: linear-gradient(to bottom, #11998e, #38ef7d); display: none; }

        h1 { font-size: 3.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 0 10px 20px 10px; }
        p { font-size: 1.3rem; margin-bottom: 30px; padding: 0 20px; }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            p { font-size: 1.1rem; }
        }

        .big-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            background-color: #fff;
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .big-btn:active {
            background-color: var(--primary-color);
            color: white;
            transform: scale(0.95);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .grade-letter {
            font-size: 7rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: 10px;
        }

    </style>
</head>
<body>

<div id="game-container">
    <!-- Background Layer -->
    <div id="background-layer" style="background: linear-gradient(to bottom, #87CEEB, #E0F7FA);"></div>

    <!-- Character Layer -->
    <div id="character-layer"></div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div id="dialogue-box" onclick="advanceStory()">
            <div id="name-label">Name</div>
            <div id="dialogue-text">...</div>
            <div class="continue-icon">▼</div>
        </div>
        
        <div id="choices-container"></div>
    </div>

    <!-- Title Screen -->
    <div id="title-screen" class="full-screen">
        <h1>First Trip in California</h1>
        <p>A Visual Novel Adventure</p>
        <!-- Directly starts game to avoid keyboard popups -->
        <button class="big-btn" onclick="startGame()">Start Adventure</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="full-screen">
        <h1 style="color: #ff4d4d;">GAME OVER</h1>
        <p id="game-over-reason">Reason goes here...</p>
        <button class="big-btn" onclick="location.reload()">Try Again</button>
    </div>

    <!-- Grade Screen -->
    <div id="grade-screen" class="full-screen">
        <h1>Adventure Complete!</h1>
        <div id="final-grade" class="grade-letter">A</div>
        <p id="final-score-text">Points: 0</p>
        <button class="big-btn" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    // --- GAME STATE ---
    let state = {
        playerName: "Traveler", // Hardcoded to prevent mobile keyboard issues
        currentSceneId: "start",
        stepIndex: 0,
        waitingForChoice: false,
        score: 0,
        typingInterval: null
    };

    // --- ASSETS ---
    const backgrounds = {
        "classroom": "linear-gradient(to bottom, #d7d2cc, #304352)", 
        "house": "linear-gradient(to bottom, #ff9966, #ff5e62)",
        "bedroom": "linear-gradient(to bottom, #232526, #414345)",
        // Using high-quality, stable Wikimedia URLs
        "nature": "url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Tunnel_View%2C_Yosemite_Valley%2C_Yosemite_NP_-_Diliff.jpg/1024px-Tunnel_View%2C_Yosemite_Valley%2C_Yosemite_NP_-_Diliff.jpg')",
        "bridge": "url('https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/1024px-GoldenGateBridge-001.jpg')",
        "city": "url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Hollywood_Sign_%28Zuschnitt%29.jpg/1024px-Hollywood_Sign_%28Zuschnitt%29.jpg')",
        "road": "url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Route_66_Shield_on_Road.jpg/1024px-Route_66_Shield_on_Road.jpg')" 
    };

    const characters = {
        "Teacher": { color: "#ffffff", emoji: "👩‍🏫" },
        "Friend": { color: "#84fab0", emoji: "🧑🏽" },
        "Host Mom": { color: "#ff9a9e", emoji: "👩🏻" }
    };

    // --- STORY SCRIPT ---
    const story = {
        "start": [
            { type: "background", bg: "classroom" },
            { type: "sound", effect: "🔔 Ring Ring!" },
            { type: "dialogue", name: "Teacher", text: "That’s the bell! Class dismissed! Have a nice weekend everyone!" },
            { type: "dialogue", name: "", text: "A classmate approaches you." },
            { type: "dialogue", name: "Friend", text: "Hey! You're the new exchange student, right? {player}?" },
        ],
        "scene_intro": [
            { type: "dialogue", name: "Friend", text: "Nice to meet you! You've finished your first week of school, what do you think?" },
            { type: "choice", options: [
                { text: "It was okay.", next: "scene_california_choice", score: 0 },
                { text: "I still feel a bit nervous!", next: "scene_california_choice", score: 0 },
                { text: "TGIF! Thank Goodness it's Friday!", next: "scene_california_choice", score: 1 }
            ]}
        ],
        "scene_california_choice": [
            { type: "dialogue", name: "Friend", text: "Well, it’s your first weekend in California. We should do something special! Where do you want to go?" },
            { type: "choice", options: [
                { text: "Hike in Yosemite National Park", next: "scene_host_prep", score: 0 },
                { text: "See the Golden Gate Bridge", next: "scene_host_prep", score: 0 },
                { text: "Drive on Route 66", next: "scene_host_prep", score: 0 },
                { text: "See the Hollywood Sign", next: "scene_host_prep", score: 0 }
            ]}
        ],
        "scene_host_prep": [
            { type: "background", bg: "house" },
            { type: "dialogue", name: "Friend", text: "That sounds awesome. But you’ll have to ask your host family if they can drive us." },
            { type: "dialogue", name: "Friend", text: "What’s the most polite way to ask?" },
            { type: "choice", options: [
                { text: "Take me there now.", next: "bad_host_response", score: -1 },
                { text: "I must go there.", next: "bad_host_response", score: -1 },
                { text: "I would like to go to...", next: "ok_host_response", score: 0 },
                { text: "If possible, it would be great to visit...", next: "good_host_response", score: 1 }
            ]}
        ],
        "bad_host_response": [
            { type: "dialogue", name: "Host Mom", text: "Excuse me? That is not a very polite way to ask." },
            { type: "game_over", reason: "You were rude to your host family." }
        ],
        "ok_host_response": [
            { type: "dialogue", name: "Host Mom", text: "Well, okay. I think we can make time for that." },
             { type: "goto", next: "scene_morning" }
        ],
        "good_host_response": [
            { type: "dialogue", name: "Host Mom", text: "Of course! How polite. Actually, I was planning a road trip. Let's visit ALL of those places!" },
            { type: "goto", next: "scene_morning" }
        ],
        "scene_morning": [
            { type: "background", bg: "bedroom" },
            { type: "dialogue", name: "Friend", text: "We get to go everywhere! But we’ll have to wake up bright and early... What time works for you?" },
            { type: "choice", options: [
                { text: "5:00 AM", next: "time_early", score: -1 },
                { text: "7:00 AM", next: "time_perfect", score: 1 },
                { text: "11:00 AM", next: "time_late", score: -1 },
                { text: "Sleep in", next: "time_sleep", score: -5 }
            ]}
        ],
        "time_early": [
            { type: "dialogue", name: "Friend", text: "Too early! I can't wake up then!" },
            { type: "goto", next: "scene_yosemite" }
        ],
        "time_late": [
            { type: "dialogue", name: "Friend", text: "Too late! We'll hit all the traffic!" },
            { type: "goto", next: "scene_yosemite" }
        ],
        "time_perfect": [
            { type: "dialogue", name: "Friend", text: "Perfect! See you in the morning." },
            { type: "goto", next: "scene_yosemite" }
        ],
        "time_sleep": [
            { type: "dialogue", name: "Narrator", text: "Zzz... Zzz..." },
            { type: "game_over", reason: "You slept in and missed the entire road trip!" }
        ],

        // --- YOSEMITE ---
        "scene_yosemite": [
            { type: "background", bg: "nature" },
            { type: "dialogue", name: "Friend", text: "We made it! Yosemite National Park." },
            { type: "dialogue", name: "Friend", text: "It's beautiful! Time for a quick trivia question." },
            { type: "dialogue", name: "Friend", text: "Which fact about Yosemite is TRUE?" },
            { type: "choice", options: [
                { text: "It is famous for giant Sequoia trees.", next: "yosemite_correct", score: 1 },
                { text: "It is located in New York.", next: "yosemite_wrong", score: 0 },
                { text: "It is a desert with no trees.", next: "yosemite_wrong", score: 0 }
            ]}
        ],
        "yosemite_correct": [
            { type: "dialogue", name: "Friend", text: "Correct! The trees here are absolutely massive!" },
            { type: "goto", next: "scene_goldengate" }
        ],
        "yosemite_wrong": [
            { type: "dialogue", name: "Friend", text: "Not quite! It's actually famous for its giant Sequoia trees." },
            { type: "goto", next: "scene_goldengate" }
        ],

        // --- GOLDEN GATE BRIDGE ---
        "scene_goldengate": [
            { type: "background", bg: "bridge" },
            { type: "dialogue", name: "Friend", text: "Next stop: The Golden Gate Bridge in San Francisco!" },
            { type: "dialogue", name: "Friend", text: "Do you know this fact? Which statement is TRUE?" },
            { type: "choice", options: [
                { text: "Its color is 'International Orange'.", next: "goldengate_correct", score: 1 },
                { text: "It is painted real gold.", next: "goldengate_wrong", score: 0 },
                { text: "Cars are not allowed on it.", next: "goldengate_wrong", score: 0 }
            ]}
        ],
        "goldengate_correct": [
            { type: "dialogue", name: "Friend", text: "That's right! The orange color helps it stand out in the thick fog." },
            { type: "goto", next: "scene_hollywood" }
        ],
        "goldengate_wrong": [
            { type: "dialogue", name: "Friend", text: "Nope! The color is actually a special shade called 'International Orange'." },
            { type: "goto", next: "scene_hollywood" }
        ],

        // --- HOLLYWOOD SIGN ---
        "scene_hollywood": [
            { type: "background", bg: "city" },
            { type: "dialogue", name: "Friend", text: "Look up there! It's the Hollywood Sign!" },
            { type: "dialogue", name: "Friend", text: "Trivia time! Which fact is TRUE?" },
            { type: "choice", options: [
                { text: "It originally read 'HOLLYWOODLAND'.", next: "hollywood_correct", score: 1 },
                { text: "It sits on the Empire State Building.", next: "hollywood_wrong", score: 0 },
                { text: "It was built for a Star Wars movie.", next: "hollywood_wrong", score: 0 }
            ]}
        ],
        "hollywood_correct": [
            { type: "dialogue", name: "Friend", text: "Yes! They removed the 'LAND' part in 1949." },
            { type: "goto", next: "scene_route66" }
        ],
        "hollywood_wrong": [
            { type: "dialogue", name: "Friend", text: "Actually, it originally said 'HOLLYWOODLAND' to advertise real estate!" },
            { type: "goto", next: "scene_route66" }
        ],

        // --- ROUTE 66 ---
        "scene_route66": [
            { type: "background", bg: "road" },
            { type: "dialogue", name: "Friend", text: "And finally, we are cruising down Route 66." },
            { type: "dialogue", name: "Friend", text: "Last question! Which fact is TRUE?" },
            { type: "choice", options: [
                { text: "It is nicknamed the 'Main Street of America'.", next: "route66_correct", score: 1 },
                { text: "It connects New York to Florida.", next: "route66_wrong", score: 0 },
                { text: "It is strictly for bicycles only.", next: "route66_wrong", score: 0 }
            ]}
        ],
        "route66_correct": [
            { type: "dialogue", name: "Friend", text: "Correct! It's also called the 'Mother Road'." },
            { type: "goto", next: "scene_reflection" }
        ],
        "route66_wrong": [
            { type: "dialogue", name: "Friend", text: "Not quite. It's actually known as the 'Main Street of America'!" },
            { type: "goto", next: "scene_reflection" }
        ],

        // --- REFLECTION & END ---
        "scene_reflection": [
            { type: "background", bg: "classroom" },
            { type: "dialogue", name: "Friend", text: "Wow, what a weekend. We saw so much!" },
            { type: "dialogue", name: "Friend", text: "Which place was your absolute favorite?" },
            { type: "choice", options: [
                { text: "Yosemite National Park", next: "end_grading", score: 0 },
                { text: "Golden Gate Bridge", next: "end_grading", score: 0 },
                { text: "Route 66", next: "end_grading", score: 0 },
                { text: "The Hollywood Sign", next: "end_grading", score: 0 }
            ]}
        ],
        "end_grading": [
            { type: "dialogue", name: "Friend", text: "That was my favorite too! I can't wait for our next trip." },
            { type: "calculate_grade" }
        ]
    };

    // --- ENGINE LOGIC ---
    const ui = {
        titleScreen: document.getElementById('title-screen'),
        gameOverScreen: document.getElementById('game-over-screen'),
        gradeScreen: document.getElementById('grade-screen'),
        dialogueBox: document.getElementById('dialogue-box'),
        nameLabel: document.getElementById('name-label'),
        dialogueText: document.getElementById('dialogue-text'),
        choicesContainer: document.getElementById('choices-container'),
        bgLayer: document.getElementById('background-layer'),
        charLayer: document.getElementById('character-layer')
    };

    // Starts directly now, bypassing the text input
    function startGame() {
        ui.titleScreen.style.display = 'none';
        ui.dialogueBox.style.display = 'block';
        loadScene("start");
    }

    function loadScene(sceneId) {
        state.currentSceneId = sceneId;
        state.stepIndex = 0;
        processStep();
    }

    function processStep() {
        const scene = story[state.currentSceneId];
        
        if (!scene || state.stepIndex >= scene.length) {
            if (state.currentSceneId === "start") loadScene("scene_intro");
            return;
        }

        const step = scene[state.stepIndex];

        if (step.type === "dialogue") {
            renderDialogue(step);
            state.waitingForChoice = false;
        } 
        else if (step.type === "sound") {
            ui.dialogueText.innerHTML = `<i>*${step.effect}*</i>`;
            setTimeout(() => {
                state.stepIndex++;
                processStep();
            }, 1500);
        }
        else if (step.type === "background") {
            setBackground(step.bg);
            state.stepIndex++; 
            processStep();
        }
        else if (step.type === "choice") {
            renderChoices(step.options);
            state.waitingForChoice = true;
        }
        else if (step.type === "goto") {
            loadScene(step.next);
        }
        else if (step.type === "game_over") {
            triggerGameOver(step.reason);
        }
        else if (step.type === "calculate_grade") {
            showGrade();
        }
    }

    function renderDialogue(step) {
        let displayName = step.name === "Narrator" ? "" : step.name;
        let dialogue = step.text.replace("{player}", state.playerName);

        ui.nameLabel.innerText = displayName;
        ui.nameLabel.style.display = displayName === "" ? "none" : "block";
        ui.nameLabel.style.color = characters[step.name] ? characters[step.name].color : "#fff";

        ui.charLayer.innerHTML = ''; 
        if (characters[step.name]) {
            const charDiv = document.createElement('div');
            charDiv.className = 'character-sprite';
            charDiv.innerText = characters[step.name].emoji || ""; 
            ui.charLayer.appendChild(charDiv);
        }

        ui.dialogueText.innerHTML = "";
        let i = 0;
        const speed = 25; 
        
        if (state.typingInterval) clearInterval(state.typingInterval);

        state.typingInterval = setInterval(() => {
            if (i < dialogue.length) {
                ui.dialogueText.innerHTML += dialogue.charAt(i);
                i++;
            } else {
                clearInterval(state.typingInterval);
                state.typingInterval = null;
            }
        }, speed);
    }

    function setBackground(bgKey) {
        const bgStyle = backgrounds[bgKey];
        if (bgStyle) {
            ui.bgLayer.style.background = bgStyle;
            ui.bgLayer.style.backgroundSize = "cover";
            ui.bgLayer.style.backgroundPosition = "center";
        }
    }

    function renderChoices(options) {
        ui.choicesContainer.innerHTML = ""; 
        ui.dialogueBox.style.display = "none"; 

        options.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'choice-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                if (opt.score) state.score += opt.score;
                
                ui.choicesContainer.innerHTML = ""; 
                ui.dialogueBox.style.display = "block"; 
                loadScene(opt.next);
            };
            ui.choicesContainer.appendChild(btn);
        });
    }

    function triggerGameOver(reason) {
        ui.dialogueBox.style.display = "none";
        ui.gameOverScreen.style.display = "flex";
        document.getElementById('game-over-reason').innerText = reason;
    }

    function showGrade() {
        ui.dialogueBox.style.display = "none";
        ui.gradeScreen.style.display = "flex";
        
        let grade = "F";
        if (state.score >= 6) grade = "A+";
        else if (state.score >= 4) grade = "A";
        else if (state.score >= 3) grade = "B";
        else if (state.score >= 1) grade = "C";
        else grade = "D";
        
        document.getElementById('final-grade').innerText = grade;
        document.getElementById('final-score-text').innerText = "Total Score: " + state.score + " / 6";
    }

    function advanceStory() {
        if (state.typingInterval) {
            const scene = story[state.currentSceneId];
            const step = scene[state.stepIndex];
            clearInterval(state.typingInterval);
            state.typingInterval = null;
            ui.dialogueText.innerHTML = step.text.replace("{player}", state.playerName);
            return;
        }

        if (state.waitingForChoice) return;

        state.stepIndex++;
        processStep();
    }
</script>

</body>
</html>
